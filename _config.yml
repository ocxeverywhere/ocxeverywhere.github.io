title: OCX Everywhere
tagline: Practical apps and engineering notes
description: Independent Android and Windows apps, product stories, and engineering notes from LazyDaddy.
url: https://ocxeverywhere.github.io
baseurl: ""
timezone: Europe/Helsinki
lang: ko
theme: jekyll-theme-chirpy

author:
  name: LazyDaddy
  email: ocxeverywhere@gmail.com
  image: /assets/img/social/default-card.png

publisher:
  name: LazyDaddy
  image: /assets/img/social/default-card.png

logo: /assets/img/social/default-card.png
image: /assets/img/social/default-card.png

social:
  name: LazyDaddy
  email: ocxeverywhere@gmail.com
  links:
    - https://github.com/ocxeverywhere

github:
  username: ocxeverywhere

analytics:
  google:
    id: ""

pwa:
  enabled: true
  cache:
    enabled: true

permalink: /:categories/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: "_posts/en"
      type: posts
    values:
      layout: post
      lang: en
      author: LazyDaddy
      permalink: /en/blog/posts/:title/
  - scope:
      path: "_posts/ko"
      type: posts
    values:
      layout: post
      lang: ko
      author: LazyDaddy
      permalink: /blog/posts/:title/
  - scope:
      path: "en"
    values:
      lang: en

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .agents
