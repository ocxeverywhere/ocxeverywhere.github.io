<figure class="media-embed">
  <div class="media-embed__frame">
    <iframe src="https://www.youtube-nocookie.com/embed/{{ include.id }}" title="{{ include.title | escape }}" loading="lazy" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
  </div>
  <figcaption>{{ include.title }}</figcaption>
</figure>
