<article class="post-card">
  <p class="post-meta"><time datetime="{{ include.post.date | date_to_xmlschema }}">{{ include.post.date | date: '%Y-%m-%d' }}</time></p>
  <h2><a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a></h2>
  <p>{{ include.post.description | default: include.post.excerpt | strip_html | truncate: 180 }}</p>
  <div class="chips">{% for tag in include.post.tags %}<span>{{ tag }}</span>{% endfor %}</div>
</article>
