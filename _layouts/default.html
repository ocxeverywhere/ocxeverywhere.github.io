<!doctype html>
<html lang="{{ page.lang | default: site.lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    {% include post-seo.html %}
    {% if page.robots %}<meta name="robots" content="{{ page.robots }}">{% endif %}
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="All posts" href="{{ '/feed.xml' | absolute_url }}">
    {% if page.lang == 'ko' %}<link rel="alternate" type="application/atom+xml" title="한국어 posts" href="{{ '/blog/feed.xml' | absolute_url }}">{% elsif page.lang == 'en' %}<link rel="alternate" type="application/atom+xml" title="English posts" href="{{ '/en/blog/feed.xml' | absolute_url }}">{% endif %}
    {% include hreflang.html %}
  </head>
  <body class="page-{{ page.layout | default: 'default' }}">
    <a class="skip-link" href="#main-content">Skip to content</a>
    {% include header.html %}
    <main id="main-content">{{ content }}</main>
    {% include footer.html %}
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
