<!doctype html>
<html lang="{{ page.lang | default: site.lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="{{ page.redirect_to | absolute_url }}">
    <meta http-equiv="refresh" content="0; url={{ page.redirect_to | relative_url }}">
  </head>
  <body>
    <main>
      <p><a href="{{ page.redirect_to | relative_url }}">{% if page.lang == 'ko' %}새 주소로 이동{% else %}Continue to the new address{% endif %}</a></p>
    </main>
  </body>
</html>
